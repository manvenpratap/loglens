[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --no-header
    -q
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    smoke: fast-running smoke subset (select with '-m smoke')
